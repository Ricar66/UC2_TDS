<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   <script>
    const a = "20";
    const b = a * 2;
    const c = a / 2;
    const d = a - 2;

    // Podemos usar number tambem para conversoes mais flexivel 
    const e = parseInt(a) + 2;
    console.log(`O valor de b é: ${b}`); // O valor de b é: 40
    console.log(`O valor de c é: ${c}`); // O valor de c é: 10
    console.log(`O valor de d é: ${d}`); // O valor de d é: 18
    console.log(`O valor de e é: ${e}`); // O valor de e é: 22
   </script> 
</body>
</html>
