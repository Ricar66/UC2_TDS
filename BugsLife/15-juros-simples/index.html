<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juros Simples</title>
</head>
<body>
  <h1>Juros Simples</h1>

  <form>
    <p>
      Capital:
      <input type="number" name="inCapital" step="0.01" required>
    </p>
    <p>
      Taxa mensal (%):
      <input type="number" name="inTaxa" step="0.1" required>
    </p>
    <p>
      Tempo em meses:
      <input type="number" name="inTempo" required>
    </p>
    <input type="submit" value="Calcular">
  </form>

  <h3></h3>
  <h4></h4>

  <script src="script.js"></script>
</body>
</html>
