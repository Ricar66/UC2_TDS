<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
       const bairro = prompt("Bairro de Entrega")
       let taxaDeEntrega;

       switch(bairro){

        case 'Centro' :
            taxaDeEntrega = 5.00;
            break;
        case 'Campos Elisios' :
        case 'Jardim Paulista' :
            taxaDeEntrega = 7.00;
            break;

        case 'Sumarezinho':
            taxaDeEntrega = 10.00;
            break;

          default :
            taxaDeEntrega = 15.00;
       }

       alert(`A taxa de entrega ${taxaDeEntrega.toFixed(2)}`)
   
    </script>
</body>
</html>
