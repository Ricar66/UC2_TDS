<!DOCTYPE html>
<html lang="en">

<body>
    <script>
//     h) Elaborar um programa que leia 2 notas de um aluno em uma disciplina. Calcule e informe
//    a média das notas.
//    Exemplo:
//    1º Nota: 7.0
//    2º Nota: 8.0
//    Média: 7.5

const nota1 = prompt("Digite a primeira nota: ")
const nota2 = prompt("Digite a segunda nota: ")

const media = (Number(nota1) + Number(nota2)) / 2

alert(`A média das notas é: ${media.toFixed(2)}`)
    </script>
</body>
</html>
