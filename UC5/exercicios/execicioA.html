<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // a) elaboar um programa que leia um numero. calcule e informe o dobro desse numero. 
        // - Entrada de dados - ler numeros 
        // - calcular e informar o dobro do numero
        // - Saida de dados - mostrar o resultado do dobro do numero

        const numero = prompt("Digite um numero: ") 
        const dobro = numero * 2
        alert(`O dobro do numero${numero} é: ${dobro}`);
          
    </script>
</body>
</html>
