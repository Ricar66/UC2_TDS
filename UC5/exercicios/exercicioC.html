<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
//      c) Elaborar um programa que leia o valor de um jantar. Calcule e informe o valor da taxa
//      do garçom (10%) e o valor total a ser pago.
//      Exemplo de entrada e saída:
// 	    Valor do jantar: R$ 80.00
// 	    Taxa do Garcom: R$ 8.00
// 	    Total a Pagar: R$ 88.00


        const valorDoJantar = prompt("Digite o valor do jantar: ")
        const taxaDoGarcom = valorDoJantar * 0.10
        const totalApagar = Number(valorDoJantar) + Number(taxaDoGarcom)

        alert(`O valor do jantar é: R$ ${valorDoJantar}\n Taxa do Garçom (10%): R$ ${taxaDoGarcom}\n Total a Pagar: R$ ${totalApagar}`)
    </script>
</body>
</html>
