<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
//    g) Elaborar um programa para uma loja, o qual leia o preço de um produto e informe as
//    opções de pagamento da loja. Calcule e informe o valor para pagamento à vista com 10%
//    de desconto e o valor em 3x.
//    Exemplo:
//    Preço: R$ 60.00
//    À Vista: R$ 54.00
//    Ou 3x de: R$ 20.00


    const precoProduto = prompt("Digite o preço do produto: ")
    const valorAvista = Number(precoProduto) * 0.90
    const valorParcelado = Number(precoProduto) / 3


    alert(`Preço: R$ ${precoProduto} À Vista (10% de desconto): R$ ${valorAvista.toFixed(2)}
     Ou 3x de: R$ ${valorParcelado.toFixed(2)}`)
    </script>
</body>
</html>
