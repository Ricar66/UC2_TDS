<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IMC</title>
</head>
<body>
  <h1>Calculadora de IMC</h1>

  <form>
    <p>
      Peso em kg:
      <input type="number" name="inPeso" step="0.1" required>
    </p>
    <p>
      Altura em metros:
      <input type="number" name="inAltura" step="0.01" required>
    </p>
    <input type="submit" value="Calcular">
  </form>

  <h3></h3>
  <h4></h4>

  <script src="script.js"></script>
</body>
</html>
