<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
//    f) Elaborar um programa para uma pizzaria, o qual leia o valor total de uma conta e
//    quantos clientes vão pagá-la. Calcule e informe o valor a ser pago por cliente.
//    Exemplo:
//    Valor da Conta: R$ 90.00
//    Número de Clientes: 3
//    Valor por cliente: R$ 30.00

    const valorDaConta = prompt("Digite o valor total da conta: ")
    const numeroDeClientes = prompt("Digite o número de clientes: ")

    const valorPorCliente = Number(valorDaConta) / Number(numeroDeClientes)

    alert(`Valor da Conta: R$ ${valorDaConta}\n Número de Clientes: ${numeroDeClientes}\n Valor por cliente: R$ ${valorPorCliente.toFixed(2)}`)

    </script>
</body>
</html>
