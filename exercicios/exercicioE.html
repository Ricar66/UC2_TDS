<body>
   <!-- e) Elaborar um programa que leia um número. Calcule e informe os seus vizinhos, 
   ou seja, o número anterior e posterior.
   Exemplo:
   Número: 15
   Vizinhos 14 e 16 -->


   <script>
        const numero = prompt("Digite um numero: ")
        const numeroAnterior = Number(numero) - 1
        const numeroPosterior = Number(numero) + 1


        alert(`O numero escolhido é ${numero} numero anterior é: ${numeroAnterior} \n O numero posterior é: ${numeroPosterior}`)

   </script>
</body>
