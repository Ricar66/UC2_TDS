<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // Elaborar um programa que leia a duração de uma viagem em dias e horas. Calcule e 
        // informe a duração total da viagem em número de horas.
	    // Exemplo de dados de entrada e saída para viagem que durou 2 dias + 5 horas:
	    // Nº Dias: 2
	    // Nº Horas: 5
	    // Total de Horas: 53



        const duracaoEmDias = prompt("Digite a duração da viagem em dias: ")
        const duracaoEmHoras = prompt("Digite a duração da viagem em horas: ")
      
        const totalHoras = Number(duracaoEmDias) * 24 + Number(duracaoEmHoras)
        
        
        alert(`A duração total da viagem é: ${totalHoras} horas`)
    </script>
</body>
</html>
